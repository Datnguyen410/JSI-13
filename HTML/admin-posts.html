<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Posts</title>
    <link rel="stylesheet" href="../CSS/admin.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="admin-container">
      <header class="admin-header">
        <div class="logo">
          <i class="fas fa-tachometer-alt"></i> Admin Dashboard
        </div>
        <nav class="admin-nav">
          <a href="./admin.html" class="nav-link"
            ><i class="fas fa-home"></i> Dashboard</a
          >
          <a href="./admin-posts.html" class="nav-link active"
            ><i class="fas fa-edit"></i> Posts</a
          >
          <a href="#" class="nav-link"><i class="fas fa-users"></i> Users</a>
          <a href="#" class="nav-link"
            ><i class="fas fa-sign-out-alt"></i> Logout</a
          >
        </nav>
      </header>

      <main class="admin-main">
        <section class="content-section">
          <h2><i class="fas fa-plus-circle"></i> Create Admin Post</h2>
          <div class="card">
            <h3>Post as Admin</h3>
            <textarea
              id="adminContent"
              rows="4"
              placeholder="Write your admin post content..."
              style="
                width: 100%;
                padding: 1rem;
                border-radius: 6px;
                border: 1px solid #333;
                background: #181818;
                color: white;
                font-family: inherit;
                resize: vertical;
              "
            ></textarea>
            <button
              id="adminPostButton"
              class="approve"
              style="margin-top: 1rem"
            >
              <i class="fas fa-paper-plane"></i> Post as Admin
            </button>
          </div>
        </section>

        <section class="content-section">
          <h2><i class="fas fa-list"></i> All Posts</h2>
          <div id="adminPostList" class="posts-container"></div>
        </section>
      </main>
    </div>

    <script type="module" src="../JS/admin-posts.js"></script>
  </body>
</html>
