<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông báo - 🔥Confess</title>
    <link rel="stylesheet" href="../CSS/home.css" />
    <style>
      .notifications-container {
        width: 600px;
        margin: 20px auto;
      }

      .notifications-header {
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .notification-card {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        border-left: 4px solid #06b6d4;
      }

      .notification-card.read {
        opacity: 0.7;
        border-left-color: #64748b;
      }

      .notification-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .notification-title {
        font-weight: bold;
        color: #06b6d4;
        font-size: 14px;
      }

      .notification-time {
        font-size: 12px;
        color: #999;
      }

      .notification-message {
        margin: 10px 0;
        font-size: 14px;
        line-height: 1.5;
      }

      .notification-post-preview {
        background: #0f0f0f;
        padding: 10px;
        border-radius: 6px;
        margin: 10px 0;
        font-size: 13px;
        color: #ccc;
        border-left: 3px solid #3b82f6;
      }

      .notification-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .btn-mark-read {
        background: #3b82f6;
        color: white;
      }

      .btn-mark-read:hover {
        background: #2563eb;
      }

      .btn-delete {
        background: #ef4444;
        color: white;
      }

      .btn-delete:hover {
        background: #dc2626;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .filter-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .filter-btn {
        padding: 8px 16px;
        border: 1px solid #333;
        background: transparent;
        color: #ccc;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
      }

      .filter-btn:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo"><h2>🔥Confess</h2></div>
      <div class="navbar">
        <a href="./Home.html" class="nav-link">🏠</a>
        <a href="./notifications.html" class="nav-link" title="Thông báo">🔔</a>
        <a href="#" class="nav-link">📝</a>
        <a href="#" class="nav-link">💬</a>
        <a href="#" class="nav-link">🗂️</a>
      </div>
      <div class="logo-out"></div>
    </div>

    <div class="notifications-container">
      <div class="notifications-header">📬 Thông báo của tôi</div>

      <!-- 🔔 Bộ lọc thông báo -->
      <div class="filter-tabs">
        <button
          class="filter-btn active"
          onclick="filterNotifications('all', event)"
        >
          Tất cả
        </button>
        <button
          class="filter-btn"
          onclick="filterNotifications('unread', event)"
        >
          Chưa đọc
        </button>
        <button class="filter-btn" onclick="filterNotifications('read', event)">
          Đã đọc
        </button>
      </div>

      <!-- 📌 Danh sách thông báo -->
      <div id="notificationsList"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      import {
        getFirestore,
        collection,
        getDocs,
        query,
        where,
        orderBy,
        updateDoc,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBkRVxum-TEk1f3KGjOQw3KAY8j1S8wiq8",
        authDomain: "project-a830b.firebaseapp.com",
        projectId: "project-a830b",
        storageBucket: "project-a830b.firebasestorage.app",
        messagingSenderId: "1094924509327",
        appId: "1:1094924509327:web:6d1eb75aec1f8cb59a10fa",
        measurementId: "G-6FQNVDQVSP",
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const db = getFirestore(app);

      const USER_ID_KEY = "confess_user_id";
      let currentFilter = "all";
      const currentUserId = getOrCreateUserId();

      function getOrCreateUserId() {
        let userId = localStorage.getItem(USER_ID_KEY);
        if (!userId) {
          userId =
            "user_" +
            Date.now() +
            "_" +
            Math.random().toString(36).substr(2, 9);
          localStorage.setItem(USER_ID_KEY, userId);
        }
        return userId;
      }

      async function getUserNotifications() {
        const notificationsQuery = query(
          collection(db, "notifications"),
          where("userId", "==", currentUserId),
          orderBy("timestamp", "desc"),
        );
        const snapshot = await getDocs(notificationsQuery);
        const notifications = [];
        snapshot.forEach((docItem) => {
          const notification = docItem.data();
          notification.id = docItem.id;
          notifications.push(notification);
        });
        return notifications;
      }

      function getFilteredNotifications(notifications, filter) {
        if (filter === "unread") {
          return notifications.filter((n) => !n.read);
        } else if (filter === "read") {
          return notifications.filter((n) => n.read);
        }
        return notifications;
      }

      async function renderNotifications() {
        const container = document.getElementById("notificationsList");
        container.innerHTML = "";

        try {
          const notifications = await getFilteredNotifications(
            await getUserNotifications(),
            currentFilter,
          );

          if (notifications.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <p>📭 Không có thông báo nào</p>
              </div>
            `;
            return;
          }

          notifications.forEach((notif) => {
            const date = new Date(
              notif.timestamp?.seconds
                ? notif.timestamp.seconds * 1000
                : notif.timestamp || 0,
            );
            const timeStr = date.toLocaleString("vi-VN");
            const cardClass = notif.read
              ? "notification-card read"
              : "notification-card";

            const card = document.createElement("div");
            card.className = cardClass;
            card.innerHTML = `
              <div class="notification-header">
                <span class="notification-title">📬 Thông báo từ Admin</span>
                <span class="notification-time">${timeStr}</span>
              </div>
              <div class="notification-message">
                ${notif.message}
              </div>
              <div class="notification-post-preview">
                <strong>Bài viết:</strong> "${notif.content?.substring(0, 60) || ""}${notif.content?.length > 60 ? "..." : ""}"
              </div>
              <div class="notification-actions">
                ${
                  !notif.read
                    ? `<button class="btn btn-mark-read" onclick="markAsRead('${notif.id}')">
                         ✓ Đánh dấu đã đọc
                       </button>`
                    : `<button class="btn btn-mark-read" style="opacity: 0.5;" disabled>
                         ✓ Đã đọc
                       </button>`
                }
                <button class="btn btn-delete" onclick="deleteNotification('${notif.id}')">
                  🗑️ Xóa
                </button>
              </div>
            `;
            container.appendChild(card);
          });
        } catch (error) {
          console.error("Failed to load notifications", error);
          container.innerHTML = `<div class="empty-state"><p>Không thể tải thông báo.</p></div>`;
        }
      }

      window.markAsRead = async (notificationId) => {
        try {
          await updateDoc(doc(db, "notifications", notificationId), {
            read: true,
          });
          await renderNotifications();
        } catch (error) {
          console.error("Failed to mark notification as read", error);
        }
      };

      window.deleteNotification = async (notificationId) => {
        if (!confirm("Bạn có chắc muốn xóa thông báo này?")) {
          return;
        }

        try {
          await deleteDoc(doc(db, "notifications", notificationId));
          await renderNotifications();
        } catch (error) {
          console.error("Failed to delete notification", error);
        }
      };

      window.filterNotifications = async (filter, event) => {
        currentFilter = filter;

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        event?.target?.classList.add("active");

        await renderNotifications();
      };

      window.addEventListener("DOMContentLoaded", renderNotifications);
    </script>
  </body>
</html>
