<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../CSS/admin.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="admin-container">
      <header class="admin-header">
        <div class="logo">
          <i class="fas fa-tachometer-alt"></i> Admin Dashboard
        </div>
        <nav class="admin-nav">
          <a href="#" class="nav-link active"
            ><i class="fas fa-home"></i> Dashboard</a
          >
          <a href="./admin-posts.html" class="nav-link"
            ><i class="fas fa-edit"></i> Posts</a
          >
          <a href="#" class="nav-link"><i class="fas fa-users"></i> Users</a>
          <a href="#" class="nav-link"
            ><i class="fas fa-sign-out-alt"></i> Logout</a
          >
        </nav>
      </header>

      <main class="admin-main">
        <div class="stats-grid">
          <div class="stat-card">
            <i class="fas fa-file-alt"></i>
            <h3>Pending Posts</h3>
            <p id="pendingCount">0</p>
          </div>
          <div class="stat-card">
            <i class="fas fa-users"></i>
            <h3>Total Users</h3>
            <p id="userCount">0</p>
          </div>
          <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <h3>Approved Posts</h3>
            <p id="approvedCount">0</p>
          </div>
        </div>

        <section class="content-section">
          <h2><i class="fas fa-list"></i> Pending Approvals</h2>
          <div id="adminPosts" class="posts-container"></div>
        </section>
      </main>
    </div>

    <script type="module" src="../JS/admin.js"></script>
  </body>
</html>
