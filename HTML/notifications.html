<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông báo - 🔥Confess</title>
    <link rel="stylesheet" href="../CSS/home.css" />
    <style>
      .notifications-container {
        width: 600px;
        margin: 20px auto;
      }

      .notifications-header {
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .notification-card {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        border-left: 4px solid #06b6d4;
      }

      .notification-card.read {
        opacity: 0.7;
        border-left-color: #64748b;
      }

      .notification-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .notification-title {
        font-weight: bold;
        color: #06b6d4;
        font-size: 14px;
      }

      .notification-time {
        font-size: 12px;
        color: #999;
      }

      .notification-message {
        margin: 10px 0;
        font-size: 14px;
        line-height: 1.5;
      }

      .notification-post-preview {
        background: #0f0f0f;
        padding: 10px;
        border-radius: 6px;
        margin: 10px 0;
        font-size: 13px;
        color: #ccc;
        border-left: 3px solid #3b82f6;
      }

      .notification-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .btn-mark-read {
        background: #3b82f6;
        color: white;
      }

      .btn-mark-read:hover {
        background: #2563eb;
      }

      .btn-delete {
        background: #ef4444;
        color: white;
      }

      .btn-delete:hover {
        background: #dc2626;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .filter-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .filter-btn {
        padding: 8px 16px;
        border: 1px solid #333;
        background: transparent;
        color: #ccc;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
      }

      .filter-btn:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo"><h2>🔥Confess</h2></div>
      <div class="navbar">
        <a href="./Home.html" class="nav-link">🏠</a>
        <a href="./notifications.html" class="nav-link" title="Thông báo">🔔</a>
        <a href="#" class="nav-link">📝</a>
        <a href="#" class="nav-link">💬</a>
        <a href="#" class="nav-link">🗂️</a>
      </div>
      <div class="logo-out"></div>
    </div>

    <div class="notifications-container">
      <div class="notifications-header">📬 Thông báo của tôi</div>

      <!-- 🔔 Bộ lọc thông báo -->
      <div class="filter-tabs">
        <button class="filter-btn active" onclick="filterNotifications('all')">
          Tất cả
        </button>
        <button class="filter-btn" onclick="filterNotifications('unread')">
          Chưa đọc
        </button>
        <button class="filter-btn" onclick="filterNotifications('read')">
          Đã đọc
        </button>
      </div>

      <!-- 📌 Danh sách thông báo -->
      <div id="notificationsList"></div>
    </div>

    <script>
      // 👤 Hệ thống userId
      const USER_ID_KEY = "confess_user_id";
      const NOTIFICATIONS_KEY = "confess_notifications";
      const POSTS_KEY = "confess_posts_demo";
      let currentFilter = "all";

      function getOrCreateUserId() {
        let userId = localStorage.getItem(USER_ID_KEY);
        if (!userId) {
          userId =
            "user_" +
            Date.now() +
            "_" +
            Math.random().toString(36).substr(2, 9);
          localStorage.setItem(USER_ID_KEY, userId);
        }
        return userId;
      }

      const currentUserId = getOrCreateUserId();

      // 📌 Lấy tất cả thông báo của user hiện tại
      function getUserNotifications() {
        const raw = localStorage.getItem(NOTIFICATIONS_KEY);
        const notifications = raw ? JSON.parse(raw) : [];
        return notifications
          .filter((n) => n.userId === currentUserId)
          .sort((a, b) => b.timestamp - a.timestamp);
      }

      // 📌 Lấy thông báo theo filter
      function getFilteredNotifications(filter) {
        const notifications = getUserNotifications();
        if (filter === "unread") {
          return notifications.filter((n) => !n.read);
        } else if (filter === "read") {
          return notifications.filter((n) => n.read);
        }
        return notifications;
      }

      // 📌 Render danh sách thông báo
      function renderNotifications() {
        const container = document.getElementById("notificationsList");
        const notifications = getFilteredNotifications(currentFilter);

        container.innerHTML = "";

        if (notifications.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <p>📭 Không có thông báo nào</p>
            </div>
          `;
          return;
        }

        notifications.forEach((notif) => {
          const date = new Date(notif.timestamp);
          const timeStr = date.toLocaleString("vi-VN");
          const cardClass = notif.read
            ? "notification-card read"
            : "notification-card";

          const card = document.createElement("div");
          card.className = cardClass;
          card.innerHTML = `
            <div class="notification-header">
              <span class="notification-title">📬 Thông báo từ Admin</span>
              <span class="notification-time">${timeStr}</span>
            </div>
            <div class="notification-message">
              ${notif.message}
            </div>
            <div class="notification-post-preview">
              <strong>Bài viết:</strong> "${notif.content.substring(0, 60)}${notif.content.length > 60 ? "..." : ""}"
            </div>
            <div class="notification-actions">
              ${
                !notif.read
                  ? `<button class="btn btn-mark-read" onclick="markAsRead('${notif.id}')">
                       ✓ Đánh dấu đã đọc
                     </button>`
                  : `<button class="btn btn-mark-read" style="opacity: 0.5;" disabled>
                       ✓ Đã đọc
                     </button>`
              }
              <button class="btn btn-delete" onclick="deleteNotification('${notif.id}')">
                🗑️ Xóa
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      // 📌 Đánh dấu thông báo đã đọc
      window.markAsRead = (notificationId) => {
        const raw = localStorage.getItem(NOTIFICATIONS_KEY);
        const notifications = raw ? JSON.parse(raw) : [];
        const notif = notifications.find((n) => n.id === notificationId);
        if (notif) {
          notif.read = true;
          localStorage.setItem(
            NOTIFICATIONS_KEY,
            JSON.stringify(notifications),
          );
          renderNotifications();
        }
      };

      // 📌 Xóa thông báo
      window.deleteNotification = (notificationId) => {
        if (confirm("Bạn có chắc muốn xóa thông báo này?")) {
          const raw = localStorage.getItem(NOTIFICATIONS_KEY);
          const notifications = raw ? JSON.parse(raw) : [];
          const filtered = notifications.filter((n) => n.id !== notificationId);
          localStorage.setItem(NOTIFICATIONS_KEY, JSON.stringify(filtered));
          renderNotifications();
        }
      };

      // 📌 Lọc thông báo
      window.filterNotifications = (filter) => {
        currentFilter = filter;

        // Update active button
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        event.target.classList.add("active");

        renderNotifications();
      };

      // Load thông báo khi trang load
      window.addEventListener("DOMContentLoaded", renderNotifications);
    </script>
  </body>
</html>
