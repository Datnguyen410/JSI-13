<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập · 🔥Confess</title>
  <link rel="stylesheet" href="./src/css/auth.css">
</head>
<body class="auth-page">
  <div class="weather-bg">
    <span class="shape"></span>
    <span class="shape"></span>
    <span class="shape"></span>
    <span class="shape"></span>
  </div>

  <a href="index.html" class="back-home">← Về trang chủ</a>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <h1>Đăng nhập</h1>
      </div>
      <p class="subtitle">Thay lời bạn muốn nói</p>

      <form class="auth-form" id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Đăng nhập</button>
      </form>

      <div class="auth-divider">
        <span></span>
        <p>hoặc</p>
        <span></span>
      </div>

      <div class="social-login">
        <button type="button" id="googleLogin" class="btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
          Đăng nhập với Google
        </button>
        <div id="user" class="user-preview"></div>
      </div>

      <div class="auth-footer">
        Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/login.js"></script>
</body>
</html>
