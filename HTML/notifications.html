<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông báo - 🔥Confess</title>
    <link rel="stylesheet" href="../CSS/home.css" />
    <link rel="stylesheet" href="../CSS/notification.css" />
  </head>
  <body>
    <div class="sidebar">
      <div class="logo"><h2>🔥Confess</h2></div>
      <div class="navbar">
        <a href="./Home.html" class="nav-link">🏠</a>
        <a href="./notifications.html" class="nav-link" title="Thông báo">🔔</a>
        <a href="#" class="nav-link">📝</a>
        <a href="#" class="nav-link">💬</a>
        <a href="#" class="nav-link">🗂️</a>
      </div>
      <div class="logo-out"></div>
    </div>

    <div class="notifications-container">
      <div class="notifications-header">📬 Thông báo của tôi</div>

      <!-- 🔔 Bộ lọc thông báo -->
      <div class="filter-tabs">
        <button
          class="filter-btn active"
          onclick="filterNotifications('all', event)"
        >
          Tất cả
        </button>
        <button
          class="filter-btn"
          onclick="filterNotifications('unread', event)"
        >
          Chưa đọc
        </button>
        <button class="filter-btn" onclick="filterNotifications('read', event)">
          Đã đọc
        </button>
      </div>

      <!-- 📌 Danh sách thông báo -->
      <div id="notificationsList"></div>
    </div>

<script src="../JS/notifications.js"></script>
  </body>
</html>
